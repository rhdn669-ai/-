<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-size:14px;font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f4f6f9;color:#1a202c;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d1d9e0;border-radius:10px}
button{cursor:pointer;font-family:inherit;transition:all .15s}
button:active{transform:scale(.97)}
input,select,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#667eea!important;box-shadow:0 0 0 3px rgba(102,126,234,.12)}

/* layout */
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{flex-shrink:0;background:#fff;border-bottom:1px solid #edf2f7;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:50px;box-shadow:0 1px 8px rgba(0,0,0,.06);z-index:100}
#filters{flex-shrink:0;background:#f4f6f9;padding:8px 16px;border-bottom:1px solid #edf2f7;display:flex;flex-direction:column;gap:7px}
#content{flex:1;overflow-y:auto;overflow-x:auto;padding:12px 16px}

/* card */
.card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.05)}

/* badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}

/* table */
#tbl{width:100%;border-collapse:collapse;min-width:820px;table-layout:fixed}
#tbl thead th{padding:9px 10px;text-align:left;font-size:11px;font-weight:600;color:#a0aec0;white-space:nowrap;background:#fafbfd;position:sticky;top:0;z-index:2}
#tbl tbody tr{border-bottom:1px solid #f7f9fc;cursor:pointer;transition:background .1s}
#tbl tbody tr:hover td{background:#f0f4ff!important}
#tbl tbody td{padding:8px 10px;vertical-align:middle}

/* progress */
.prog-track{flex:1;height:6px;background:#edf2f7;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .5s}

/* task btn */
.task-btn{flex:1;padding:6px 0;border-radius:7px;font-size:12px;border:1.5px solid #e2e8f0;background:#fff;color:#a0aec0;font-weight:500}
.task-btn:hover{border-color:#cbd5e0;color:#718096}
.task-btn.active{font-weight:700}

/* modal */
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(15,20,30,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:20px;width:min(900px,100%);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-left{width:290px;flex-shrink:0;border-right:1px solid #f0f4f8;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px;background:#fafbfd}
.modal-right{flex:1;overflow-y:auto;padding:20px 18px}

/* dropzone */
.dropzone{border:2px dashed #c3dafe;border-radius:14px;padding:28px;text-align:center;background:#f0f4ff;cursor:pointer;transition:all .2s}
.dropzone:hover,.dropzone.drag{border-color:#667eea;background:#e8efff}

/* btn */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:1.5px solid transparent}
.btn-ghost{background:#fff;color:#4a5568;border-color:#e2e8f0}
.btn-primary{background:#1a202c;color:#fff;border-color:#1a202c}

/* kanban */
#kanban{display:flex;gap:14px;align-items:flex-start;padding-bottom:8px}
.kan-col{flex:0 0 210px;border-radius:14px;padding:12px;background:#fff}
.kan-card{background:#fafbfd;border-radius:10px;padding:11px;cursor:pointer;border:1px solid #edf2f7;margin-bottom:8px;transition:box-shadow .15s}
.kan-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}

@media(max-width:600px){
  .modal-box{flex-direction:column}
  .modal-left{width:100%;border-right:none;border-bottom:1px solid #f0f4f8}
}

@media print {
  body { overflow: visible !important; background: #fff !important; }
  #app { height: auto !important; overflow: visible !important; }
  #header { box-shadow: none !important; position: relative !important; }
  #filters { display: none !important; }
  #content { overflow: visible !important; padding: 0 !important; }
  #table-wrap { box-shadow: none !important; border: none !important; border-radius: 0 !important; }
  #tbl { min-width: 100% !important; font-size: 10px !important; }
  #tbl thead th { font-size: 9px !important; padding: 5px 6px !important; position: static !important; }
  #tbl tbody td { padding: 5px 6px !important; }
  #kanban { display: none !important; }
  .overlay { display: none !important; }
  #btn-pdf, #btn-xl, #btn-table, #btn-kanban { display: none !important; }
  #print-title { display: block !important; }
  .prog-track { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .prog-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; border: 1px solid #ccc !important; }
  tr { page-break-inside: avoid; }
}
#print-title { display: none; font-size: 13px; font-weight: 600; color: #718096; margin-bottom: 4px; padding: 0 16px; }
</style>

/* ─── 납기/턴온 인라인 편집 ─── */
function editDate(field){
  const p=panels.find(x=>x.id===currentId); if(!p) return;
  const cur=field==="납기"?p.납기:p.턴온;
  const displayEl=document.getElementById("date-"+field+"-display");
  if(!displayEl) return;

  // input 생성
  const inp=document.createElement("input");
  inp.type="date";
  inp.value=cur;
  inp.style.cssText="width:100%;padding:4px 6px;border-radius:6px;border:1.5px solid #667eea;font-size:13px;font-weight:700;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,.15)";

  const parent=displayEl.parentNode;
  parent.replaceChild(inp,displayEl);
  inp.focus();

  const commit=()=>{
    const val=inp.value;
    if(val&&val!==cur){
      updatePanel(currentId,p=>field==="납기"?{...p,납기:val}:{...p,턴온:val});
    } else {
      renderModal();
    }
  };
  inp.addEventListener("change",commit);
  inp.addEventListener("blur",commit);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")inp.blur(); if(e.key==="Escape"){inp.value=cur;inp.blur();}});
}

    "평균 "+Math.round(filtered.reduce((a,p)=>a+p.progress,0)/(filtered.length||1))+"%"+

  window.print();
});

/* ─────────────────── 로직 ─────────────────── */
const getProjGroup=p=>String(p).replace(/[_-]\d+$/,"");
const rawToState=r=>{
  if(!r||r==="-") return"대기";
  const s=String(r).trim();
  if(s===".") return"대기";
  if(s.includes("X")) return"문제";
  if(s==="DH조립"||s==="JLT") return"진행중";
  if(s.startsWith("O")) return"완료";
  return"대기";
};
const rawToMpState=r=>{
  if(!r||r==="-"||r==="nan") return"대기";
  const s=String(r).trim();
  if(s.includes("X")) return"문제";
  if(s.startsWith("O")) return"완료";
  return"대기";
};
const deriveMpState=mp=>{
  const v=MP_SUBS.map(k=>mp[k]||"대기");
  if(v.some(s=>s==="문제")) return"문제";
  if(v.some(s=>s==="진행중")) return"진행중";
  if(v.every(s=>s==="완료")) return"완료";
  return"대기";
};
const recompute=p=>{
  const mpS=deriveMpState(p.mp하위상태||{});
  const all=[...BUPMOK.map(b=>p.부품상태[b]),mpS];
  const done=all.filter(s=>s==="완료").length;
  const hasIssue=all.some(s=>s==="문제");
  const hasProgress=all.some(s=>s==="진행중"||s==="완료");
  const progress=Math.round(done/all.length*100);
  let os;
  if(p.출고완료) os="출고완료";
  else if(p.검수완료) os="검수완료";
  else if(hasIssue) os="보류";
  else if(done===all.length) os="검수대기";
  else if(hasProgress) os="제작중";
  else os="대기중";
  return{...p,progress,overallStatus:os};
};
const buildPanel=d=>{
  const 부품상태=Object.fromEntries(BUPMOK.map(b=>[b,rawToState(d.부[b])]));
  const mp하위상태=Object.fromEntries(MP_SUBS.map(k=>[k,"대기"]));
  return recompute({id:d.id,프로젝트:d.프,자재:d.자,기구제작:d.기,정역:d.정,호기:d.호,납기:d.납,턴온:d.턴,부품상태,mp하위상태,검수완료:false,출고완료:false,비고:"",현장메모:"",문제비고:{},이력:[],프로젝트그룹:getProjGroup(d.프)});
};
const getDday=date=>{
  const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(date);d.setHours(0,0,0,0);
  return Math.ceil((d-t)/86400000);
};

const getFiltered=()=>panels.filter(p=>{
  if(hideShipped&&p.overallStatus==="출고완료"&&!isDoneNapgiSelected()) return false;
  if(filterStatus!=="전체"&&p.overallStatus!==filterStatus) return false;

});

  sr+=`<button onclick="toggleUrgent()" style="display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:12px;font-weight:600;border:none;background:${showUrgent?"#c53030":"#fff5f5"};color:${showUrgent?"#fff":"#c53030"};cursor:pointer"><span style="font-weight:700">${urgent}</span><span>⚡ D-7</span></button>`;
  if(shipped>0) sr+=`<button onclick="toggleHideShipped()" style="display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:12px;font-weight:600;border:none;background:${hideShipped?"#edf2f7":"#f0fff4"};color:${hideShipped?"#718096":"#276749"};cursor:pointer"><span style="font-weight:700">${shipped}</span><span>${hideShipped?"↑출고 숨김":"↑출고 표시"}</span></button>`;
  document.getElementById("status-row").innerHTML=sr;

  // 납기 셀렉트
  const sel=document.getElementById("napgi-sel");
  sel.innerHTML=["전체",...an].map(d=>`<option${filterNapgi===d?" selected":""}>${d}</option>`).join("");

  document.getElementById("count-lbl").textContent=filtered.length+"건";

  // 뷰 버튼
  document.getElementById("btn-table").style.background=viewMode==="table"?"#667eea":"transparent";
  document.getElementById("btn-table").style.color=viewMode==="table"?"#fff":"#718096";
  document.getElementById("btn-kanban").style.background=viewMode==="kanban"?"#667eea":"transparent";
  document.getElementById("btn-kanban").style.color=viewMode==="kanban"?"#fff":"#718096";

  if(viewMode==="table"){
    document.getElementById("table-wrap").style.display="";

    renderTable(filtered);
  } else {
    document.getElementById("table-wrap").style.display="none";
    document.getElementById("kanban").style.display="flex";
    renderKanban(filtered);
  }
}

// ── 모달 액션 ──
function updatePanel(id,fn){
  const idx=panels.findIndex(p=>p.id===id); if(idx<0) return;
  const old=panels[idx];
  panels[idx]=recompute(fn({...old}));
  if(old.overallStatus!==panels[idx].overallStatus){
    const now=new Date(),pad=n=>String(n).padStart(2,"0");
    const ts=now.getFullYear()+"-"+pad(now.getMonth()+1)+"-"+pad(now.getDate())+" "+pad(now.getHours())+":"+pad(now.getMinutes());
    panels[idx].이력=[...(old.이력||[]),{ts,from:old.overallStatus,to:panels[idx].overallStatus}].slice(-20);
  }
  // 즉시 화면 갱신 (Firebase 응답 기다리지 않음)
  renderModal(); render();
  // Firebase에 비동기 저장
  isSyncing = true;
  save();
  setTimeout(()=>{ isSyncing = false; }, 2000);
}
function setTask(b,s){updatePanel(currentId,p=>({...p,부품상태:{...p.부품상태,[b]:s}}));}
function setMpSub(k,s){updatePanel(currentId,p=>({...p,mp하위상태:{...p.mp하위상태,[k]:s}}));}
function toggleInspect(){updatePanel(currentId,p=>({...p,검수완료:!p.검수완료,출고완료:p.검수완료?false:p.출고완료}));}
function toggleShip(){const p=panels.find(x=>x.id===currentId);if(!p?.검수완료)return;updatePanel(currentId,p=>({...p,출고완료:!p.출고완료}));}
function setProbNote(b,v){const p=panels.find(x=>x.id===currentId);if(!p)return;p.문제비고={...p.문제비고,[b]:v};save();}
function saveMemo(){
  const p=panels.find(x=>x.id===currentId);if(!p)return;
  const b=document.getElementById("m-bigo"),m=document.getElementById("m-memo");
  if(b) p.비고=b.value; if(m) p.현장메모=m.value;
  save();
}
function toggleMp(){mpOpen=!mpOpen;renderModal();}

function handleXL(file){
  if(!file)return;
  if(!file.name.match(/\.(xlsx|xls)$/i)){showXLErr("xlsx/xls 파일만 가능합니다");return;}
  if(typeof XLSX==="undefined"){
    // XLSX CDN 동적 로드
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=()=>processXL(file);
    s.onerror=()=>showXLErr("SheetJS 로드 실패 (인터넷 연결 확인)");
    document.head.appendChild(s);
  } else {processXL(file);}
}
function showXLErr(msg){const e=document.getElementById("xl-err");e.textContent=msg;e.style.display="block";}
function processXL(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const dataRows=rows.filter((r,i)=>i>=2&&r[1]&&String(r[1]).match(/^H\d/));
      const fmtDate=v=>{if(!v)return"";if(v instanceof Date){const y=v.getFullYear(),m=String(v.getMonth()+1).padStart(2,"0"),d=String(v.getDate()).padStart(2,"0");return`${y}-${m}-${d}`;}const s=String(v).trim();if(/^\d{5}$/.test(s)){const d=new Date(Math.round((Number(s)-25569)*86400*1000));return`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;}if(/\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);return s;};
      const fmtVal=v=>(!v||String(v).trim()==="")?"-":String(v).trim();
      let maxId=Math.max(0,...panels.map(p=>p.id));
      dataRows.forEach(r=>{
        const proj=String(r[1]||"").trim(),hogi=String(r[5]||"").trim();
        const 납기=fmtDate(r[6]),턴온=fmtDate(r[7]);
        const ex=panels.find(p=>`${p.프로젝트}_${p.호기}`===`${proj}_${hogi}`);
        if(!ex){
          panels.push(buildPanel({id:++maxId,프:proj,자:String(r[2]||"").trim(),기:String(r[3]||"").trim(),정:String(r[4]||"").trim(),호:hogi,납:납기,턴:턴온,부:{"P/W BOX":fmtVal(r[8]),"LODER":fmtVal(r[9]),"S/D":fmtVal(r[10]),"H/T상":fmtVal(r[11]),"H/T하":fmtVal(r[12]),"ROBOT":fmtVal(r[13])}}));
        } else if(ex.납기!==납기||ex.턴온!==턴온){
          const idx=panels.findIndex(p=>p.id===ex.id);
          panels[idx]=recompute({...panels[idx],납기,턴온});
        }
      });
      save(); render(); closeXL();
    }catch(err){showXLErr("파싱 실패: "+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

/* ─────────────────── 초기 렌더 ─────────────────── */
render();
</script>
